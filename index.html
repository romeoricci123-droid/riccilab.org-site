<!doctype html>
<html lang="en">
<head>

  <title>Ricci Lab — Maintenance</title>

  <style>

    p{margin:.5rem 0;color:#333;line-height:1.6}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Site maintenance in progress</h1>

      <p>Thank you for your patience.</p>
    </section>
  </main>

</html>
